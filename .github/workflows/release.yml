name: Create Production Release

on:
  push:
    tags:
      - 'v*' # Triggers on any tag starting with 'v' (e.g., v1.0.0)

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create a release and upload assets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vue.js application
        run: npm run build

      # Step 4: Archive files while explicitly excluding unwanted items
      - name: Bundle release files
        run: |
          zip -r "orca_search_${{ github.ref_name }}.zip" . \
            -x "node_modules/*" \
            -x "src/*" \
            -x "composer.phar" \
            -x "package*" \
            -x "vite.config.js" \
            -x ".git*" \
            -x ".git/*" \
            -x ".github/*" \
            -x ".env*" \
            -x "tests/*"

      # Step 5: Automatically create the GitHub Release and attach the ZIP
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "orca_search_${{ github.ref_name }}.zip"
          generate_release_notes: true
