name: Create Production Release

on:
  push:
    tags:
      - 'v*' # Triggers on any tag starting with 'v' (e.g., v1.0.0)

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create a release and upload assets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vue.js application
        run: npm run build

      # Step 4: Archive files while explicitly excluding unwanted items
      - name: Bundle release files
        run: |
          # 1. Define the dynamic folder name based on the Git tag
          BUILD_NAME="orca_search_${{ github.ref_name }}"
          
          # 2. Create the target subfolder inside the runner's temporary directory
          mkdir -p "../${BUILD_NAME}"
          
          # 3. Copy all files to the new folder, preserving structure
          # (Using rsync makes it easy to exclude folders dynamically)
          rsync -av . "../${BUILD_NAME}" \
            --exclude='node_modules' \
            --exclude='src' \
            --exclude='composer.phar' \
            --exclude='package*' \
            --exclude='vite.config.js' \
            --exclude='.git*' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env*' \
            --exclude='.idea' \
            --exclude='tests'
          
          # 4. Navigate to the parent directory and compress the folder
          cd ..
          zip -r "${BUILD_NAME}.zip" "${BUILD_NAME}"
          
          # 5. Move the finished ZIP back to the workspace so subsequent steps can find it
          mv "${BUILD_NAME}.zip" "${GITHUB_WORKSPACE}/"

      # Step 5: Automatically create the GitHub Release and attach the ZIP
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "orca_search_${{ github.ref_name }}.zip"
          generate_release_notes: true
